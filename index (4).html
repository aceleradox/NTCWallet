<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTC Wallet - Notoriety Coin Portal & Cyber Dashboard</title>
  
  <!-- Tailwind CSS para design cyberpunk moderno -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- CDNs via Cloudflare (cdnjs) - Ultra estáveis e de alta performance -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.321.0/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>
  
  <!-- Dexie.js - Wrapper elegante e potente para IndexedDB (Nosso "SQLite" no navegador) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.4/dexie.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@500;600;700&display=swap');
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: #040408;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(16, 10, 30, 0.7) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(20, 5, 25, 0.6) 0%, transparent 45%);
      background-attachment: fixed;
    }

    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    /* Animações cyberpunk de alta fidelidade */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 16s linear infinite;
    }

    @keyframes pulse-cyan {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.05); }
    }
    .glow-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, transparent 70%);
      pointer-events: none;
      animation: pulse-cyan 6s ease-in-out infinite;
    }

    /* Scrollbar estilizada */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #020205;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f1235;
      border-radius: 4px;
      border: 1px solid #3b0764;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #db2777;
    }

    /* Efeitos de scanlines e retro-futurismo */
    .scanlines {
      position: relative;
      overflow: hidden;
    }
    .scanlines::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
    }
  </style>

  <script>
    // Inicialização da IndexedDB via Dexie
    const db = new Dexie("NtcWalletDB");
    
    // Definimos o schema do banco de dados (Tabelas e índices)
    db.version(1).stores({
      users: "username, address, seed, balance", // Chave primária: username
      transactions: "++id, username, toAddress, fromUser, amount, date, claimed",
      notes: "++id, username, text, color",
      reviews: "++id, author, title, host, vibe, timestamp",
      config: "key, value"
    });

    // Erros críticos globais
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root && (!root.children || root.children.length === 0)) {
        root.innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-6 bg-[#040408] text-white">
            <div class="max-w-md w-full bg-[#080810] border border-red-500/50 rounded-2xl p-6 shadow-xl">
              <h3 class="text-xl font-bold text-red-400 font-orbitron mb-2">Falha crítica de sistema</h3>
              <pre class="bg-black/50 p-4 rounded-xl border border-red-950 overflow-x-auto text-xs text-red-300 mb-4 whitespace-pre-wrap">${event.message || 'Erro de script externo ou inicialização.'}</pre>
              <button onclick="window.location.reload()" class="w-full py-2 bg-red-600 hover:bg-red-500 rounded-xl transition">Reiniciar Terminal</button>
            </div>
          </div>
        `;
      }
    });
  </script>
</head>
<body class="text-gray-100 min-h-screen flex flex-col justify-between scanlines">

  <!-- Div de montagem do React -->
  <div id="root" class="flex-grow flex flex-col"></div>

  <!-- Script da aplicação React -->
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    const MNEMONIC_WORDS = [
      "matrix", "net", "cyber", "token", "neon", "flow", "delta", "fusion", 
      "protocol", "node", "quantum", "sync", "hash", "link", "grid", "shield", 
      "code", "engine", "plasma", "vortex", "acelera", "notoriety", "glow", "wallet",
      "arcade", "pixel", "beacon", "citadel", "glitch", "mainframe", "proxy", "daemon"
    ];

    // ⚠️ Usuários autorizados para fazer PULL (sincronização de leitura)
    // Apenas estes usernames podem sincronizar dados do GitHub
    const AUTHORIZED_ADMINS = [
      "aceleradox",      // Admin principal
      "admin",           // Admin genérico
      "root"             // Super admin
      // Adicione mais usernames conforme necessário
    ];

    const SHOP_ITEMS = {
      neonThemes: { price: 5.0, label: "Temas Neon Customizados", desc: "Altera a cor do glow e do sotaque visual do dashboard." },
      youtubePlayer: { price: 8.0, label: "Soundtrack Player", desc: "Habilita o reprodutor de vídeos e playlists do YouTube." },
      fusionEngine: { price: 12.0, label: "Reator de Fusão Térmica", desc: "Habilita o motor de mineração pesada para farmar NTC." },
      customAvatar: { price: 3.0, label: "Identidade Holográfica", desc: "Libera a edição de fotos via link de avatar no perfil." }
    };

    const generateNewSeed = () => {
      let words = [];
      for (let i = 0; i < 12; i++) {
        const randomIndex = Math.floor(Math.random() * MNEMONIC_WORDS.length);
        words.push(MNEMONIC_WORDS[randomIndex]);
      }
      return words.join(' ');
    };

    const generateAddressFromSeed = (seed) => {
      const cleanSeed = seed.trim().toLowerCase();
      let hash = 0;
      for (let i = 0; i < cleanSeed.length; i++) {
        hash = cleanSeed.charCodeAt(i) + ((hash << 5) - hash);
      }
      let hex = '';
      let value = Math.abs(hash);
      for (let i = 0; i < 40; i++) {
        value = (value * 11) ^ cleanSeed.charCodeAt(i % cleanSeed.length);
        hex += Math.abs(value % 16).toString(16);
      }
      return 'NTC0x' + hex.substring(0, 40).toUpperCase();
    };

    function App() {
      // --- CONTROLES DE ESTADO GERAL ---
      const [currentUser, setCurrentUser] = useState(null); 
      const [registeredUsers, setRegisteredUsers] = useState([]); 
      const [activeTab, setActiveTab] = useState('auth'); 
      const [toast, setToast] = useState(null);
      const [showWalletAddress, setShowWalletAddress] = useState(false);

      // --- CONFIGURAÇÃO DO GITHUB (LEDGER GLOBAL) ---
      // ⚠️ SEGURO: Token agora é gerenciado por Netlify Functions (variáveis de ambiente)
      // Não exponha credenciais no frontend!
      const [githubSyncStatus, setGithubSyncStatus] = useState('offline'); // 'offline' | 'loading' | 'synced' | 'unauthorized'

      // --- LOGIN / CADASTRO ---
      const [authMode, setAuthMode] = useState('login'); 
      const [usernameInput, setUsernameInput] = useState('');
      const [seedInput, setSeedInput] = useState('');
      const [generatedSeed, setGeneratedSeed] = useState('');
      const [authError, setAuthError] = useState('');

      // --- BALANÇO E TRANSAÇÕES ---
      const [balance, setBalance] = useState(10.00);
      const [history, setHistory] = useState([]);
      const [sendTargetAddress, setSendTargetAddress] = useState('');
      const [sendAmount, setSendAmount] = useState('');
      const [targetUserFound, setTargetUserFound] = useState(null);
      const [isValidatingAddress, setIsValidatingAddress] = useState(false);

      // --- FARM / ROLETAS / ENGINES ---
      const [isSpinning, setIsSpinning] = useState(false);
      const [spinCooldown, setSpinCooldown] = useState(0);
      const [spinResult, setSpinResult] = useState(null);
      const spinRotation = useRef(0);

      const [engines, setEngines] = useState({
        solar: { active: false, timeLeft: 0, duration: 60, reward: 0.5, label: "Coletor Solar" },
        quantum: { active: false, timeLeft: 0, duration: 300, reward: 3.5, label: "Motor Quântico" },
        fusion: { active: false, timeLeft: 0, duration: 900, reward: 12.0, label: "Reator de Fusão" }
      });

      // --- CUSTOMIZAÇÃO E COMPRAS ---
      const [unlockedFeatures, setUnlockedFeatures] = useState({
        neonThemes: false,
        youtubePlayer: false,
        fusionEngine: false,
        customAvatar: false
      });
      const [activeNeon, setActiveNeon] = useState('purple');
      const [profileBio, setProfileBio] = useState('Nômade da rede de dados e explorador de Notoriety Coin.');
      const [profileAvatar, setProfileAvatar] = useState('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&auto=format&fit=crop&q=80');
      const [notesList, setNotesList] = useState([]);
      const [newNoteText, setNewNoteText] = useState('');

      // --- MURAL DE COMENTÁRIOS ---
      const [reviewsList, setReviewsList] = useState([]);
      const [newReview, setNewReview] = useState({ title: '', host: '', vibe: 5, reviewText: '', consented: false });

      // --- EMBED WIDGET ---
      const [embedType, setEmbedType] = useState('send');
      const [embedWallet, setEmbedWallet] = useState('');
      const [embedAmount, setEmbedAmount] = useState('1.00');

      // Paletas Cyber Neon
      const neonClasses = {
        purple: { border: 'border-purple-500/50', glow: 'shadow-[0_0_15px_rgba(167,139,250,0.45)]', text: 'text-purple-400', bg: 'bg-purple-600', shadow: 'rgba(167, 139, 250, 0.25)', bgTo: 'from-purple-950/80 to-slate-950/90', hoverBg: 'hover:bg-purple-500', fill: '#c084fc' },
        pink: { border: 'border-pink-500/50', glow: 'shadow-[0_0_15px_rgba(236,72,153,0.45)]', text: 'text-pink-400', bg: 'bg-pink-600', shadow: 'rgba(236, 72, 153, 0.25)', bgTo: 'from-pink-950/80 to-slate-950/90', hoverBg: 'hover:bg-pink-500', fill: '#f472b6' },
        cyan: { border: 'border-cyan-500/50', glow: 'shadow-[0_0_15px_rgba(6,182,212,0.45)]', text: 'text-cyan-400', bg: 'bg-cyan-600', shadow: 'rgba(6, 182, 212, 0.25)', bgTo: 'from-cyan-950/80 to-slate-950/90', hoverBg: 'hover:bg-cyan-500', fill: '#22d3ee' },
        green: { border: 'border-emerald-500/50', glow: 'shadow-[0_0_15px_rgba(16,185,129,0.45)]', text: 'text-emerald-400', bg: 'bg-emerald-600', shadow: 'rgba(16, 185, 129, 0.25)', bgTo: 'from-emerald-950/80 to-slate-950/90', hoverBg: 'hover:bg-emerald-500', fill: '#34d399' },
        gold: { border: 'border-amber-500/50', glow: 'shadow-[0_0_15px_rgba(245,158,11,0.45)]', text: 'text-amber-400', bg: 'bg-amber-600', shadow: 'rgba(245, 158, 11, 0.25)', bgTo: 'from-amber-950/80 to-slate-950/90', hoverBg: 'hover:bg-amber-500', fill: '#fbbf24' }
      };

      const currentNeon = neonClasses[activeNeon] || neonClasses.purple;

      // Executa o Lucide com proteção
      const triggerLucide = () => {
        if (typeof window.lucide !== 'undefined' && window.lucide && typeof window.lucide.createIcons === 'function') {
          try {
            window.lucide.createIcons();
          } catch (e) {
            console.warn("Lucide falhou:", e);
          }
        }
      };

      // --- INICIALIZAÇÃO DO ECOSSISTEMA ---
      useEffect(() => {
        const bootstrap = async () => {
          await loadAllReviews();
          await loadRegisteredUsers();
          // Tenta sincronizar primeiro do JSON do repositório público (Leitura automática, sem autenticação)
          await pullFromGitHubPublic();
          setTimeout(triggerLucide, 150);
        };
        bootstrap();
      }, []);

      useEffect(() => {
        setTimeout(triggerLucide, 150);
      }, [activeTab, currentUser, isSpinning, engines, githubSyncStatus]);

      const loadRegisteredUsers = async () => {
        try {
          const list = await db.users.toArray();
          setRegisteredUsers(list);
        } catch (err) {
          console.error(err);
        }
      };

      const loadAllReviews = async () => {
        try {
          const list = await db.reviews.reverse().toArray();
          setReviewsList(list);
        } catch (err) {
          console.error(err);
        }
      };

      const loadUserData = async (username) => {
        try {
          const userObj = await db.users.get(username);
          if (userObj) {
            setCurrentUser(userObj);
            setBalance(userObj.balance || 0.00);
            setUnlockedFeatures(userObj.unlockedFeatures || {
              neonThemes: false,
              youtubePlayer: false,
              fusionEngine: false,
              customAvatar: false
            });
            setActiveNeon(userObj.activeNeon || 'purple');
            setProfileBio(userObj.profileBio || 'Explorador da rede NTC.');
            setProfileAvatar(userObj.profileAvatar || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&auto=format&fit=crop&q=80');
            
            const userNotes = await db.notes.where("username").equals(username).toArray();
            setNotesList(userNotes);

            const userTx = await db.transactions
              .where("username")
              .equals(username)
              .or("toAddress")
              .equals(userObj.address)
              .reverse()
              .toArray();
            setHistory(userTx);

            setToast({ message: `Sessão @${username} carregada com sucesso!`, type: "success" });
            setActiveTab('dashboard');
          }
        } catch (err) {
          console.error(err);
        }
      };

      useEffect(() => {
        const savedSession = localStorage.getItem('ntc_logged_user');
        if (savedSession) {
          loadUserData(savedSession);
        }
      }, []);

      // --- PROTOCOLO DE CONEXÃO COM O GITHUB (LEITURA E ESCRITA DO LEDGER) ---

      // 0. PULL PÚBLICO (Sincronização automática na inicialização - sem exigir autorização)
      const pullFromGitHubPublic = async () => {
        try {
          const url = `./database.json?nocache=${Date.now()}`;
          const res = await fetch(url);
          
          if (!res.ok) {
            return; // Silenciosamente ignora se arquivo não existe
          }

          const globalData = await res.json();
          
          // Sincroniza usuários
          if (globalData.users && globalData.users.length) {
            for (let u of globalData.users) {
              const localU = await db.users.get(u.username);
              if (!localU || localU.balance !== u.balance) {
                await db.users.put(u);
              }
            }
          }

          // Sincroniza transações
          if (globalData.transactions && globalData.transactions.length) {
            for (let tx of globalData.transactions) {
              const localTx = await db.transactions.get(tx.id);
              if (!localTx) {
                await db.transactions.put(tx);
              }
            }
          }

          // Sincroniza relatos do feed
          if (globalData.reviews && globalData.reviews.length) {
            for (let rev of globalData.reviews) {
              const localRev = await db.reviews.get(rev.id);
              if (!localRev) {
                await db.reviews.put(rev);
              }
            }
          }

          await loadRegisteredUsers();
          await loadAllReviews();
        } catch (err) {
          // Silenciosamente ignora erros (arquivo pode não existir ainda)
          console.log("Sincronização automática silenciosa:", err.message);
        }
      };
      // ⚠️ AUTORIZAÇÃO: Apenas admins podem sincronizar!
      const pullFromGitHub = async () => {
        // Verifica se usuário está logado e é autorizado
        if (!currentUser) {
          showToast("Você precisa estar logado para sincronizar dados.", "error");
          return;
        }

        if (!AUTHORIZED_ADMINS.includes(currentUser.username)) {
          showToast(`⛔ Acesso negado. Apenas administradores podem sincronizar. Seu username: @${currentUser.username}`, "error");
          return;
        }

        setGithubSyncStatus('loading');
        try {
          // Buscamos o database.json do próprio repositório no GitHub Pages de forma pública (sem autenticação)
          // Usamos nocache para evitar o cache agressivo do GitHub Pages
          const url = `./database.json?nocache=${Date.now()}`;
          const res = await fetch(url);
          
          if (!res.ok) {
            // Se der 404, o arquivo ainda não foi gerado ou comitado no repositório
            setGithubSyncStatus('offline');
            return;
          }

          const globalData = await res.json();
          
          // Sincroniza usuários
          if (globalData.users && globalData.users.length) {
            for (let u of globalData.users) {
              const localU = await db.users.get(u.username);
              if (!localU || localU.balance !== u.balance) {
                await db.users.put(u);
              }
            }
          }

          // Sincroniza transações
          if (globalData.transactions && globalData.transactions.length) {
            for (let tx of globalData.transactions) {
              const localTx = await db.transactions.get(tx.id);
              if (!localTx) {
                await db.transactions.put(tx);
              }
            }
          }

          // Sincroniza relatos do feed
          if (globalData.reviews && globalData.reviews.length) {
            for (let rev of globalData.reviews) {
              const localRev = await db.reviews.get(rev.id);
              if (!localRev) {
                await db.reviews.put(rev);
              }
            }
          }

          await loadRegisteredUsers();
          await loadAllReviews();
          setGithubSyncStatus('synced');
          console.log("Banco de dados NTC sincronizado de database.json!");
        } catch (err) {
          console.warn("Falha de leitura direta do database.json:", err);
          setGithubSyncStatus('offline');
        }
      };

      // 2. PUSH (Compila o IndexedDB e sincroniza via Netlify Serverless Function)
      // ✅ SEGURO: A função serverless tem acesso ao token via variáveis de ambiente
      const pushToGitHub = async () => {
        setGithubSyncStatus('loading');
        try {
          // Reunimos todos os dados locais
          const users = await db.users.toArray();
          const transactions = await db.transactions.toArray();
          const notes = await db.notes.toArray();
          const reviews = await db.reviews.toArray();

          const payload = {
            users,
            transactions,
            notes,
            reviews,
            updatedAt: new Date().toISOString(),
            version: "2.5"
          };

          // Chama a função serverless (o token está protegido em variáveis de ambiente)
          const res = await fetch('/.netlify/functions/github-sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'push',
              payload: payload
            })
          });

          const result = await res.json();

          if (res.ok) {
            setGithubSyncStatus('synced');
            showToast("✨ Banco de dados sincronizado de forma segura com GitHub!");
          } else {
            console.error("Erro na sincronização:", result);
            setGithubSyncStatus('offline');
            showToast("Falha ao sincronizar. Verifique as variáveis de ambiente no Netlify.", "error");
          }

        } catch (err) {
          console.error("Falha ao salvar no GitHub:", err);
          setGithubSyncStatus('offline');
          showToast("Erro de conectividade com o servidor. Dados salvos localmente.", "error");
        }
      };

      // Configurações do GitHub agora são gerenciadas por variáveis de ambiente no Netlify
      // Não é mais necessário armazenar credenciais no cliente!

      // --- EXPORTAR BANCO DE DADOS (Cria arquivo portátil JSON manual) ---
      const handleExportDatabase = async () => {
        try {
          const users = await db.users.toArray();
          const transactions = await db.transactions.toArray();
          const notes = await db.notes.toArray();
          const reviews = await db.reviews.toArray();
          
          const backupData = {
            users,
            transactions,
            notes,
            reviews,
            exportedAt: new Date().toISOString(),
            version: "2.5"
          };

          const jsonString = `data:text/json;charset=utf-8,${encodeURIComponent(
            JSON.stringify(backupData, null, 2)
          )}`;
          
          const downloadAnchor = document.createElement('a');
          downloadAnchor.setAttribute("href", jsonString);
          downloadAnchor.setAttribute("download", `ntc_ecosystem_db_${Date.now()}.json`);
          document.body.appendChild(downloadAnchor);
          downloadAnchor.click();
          downloadAnchor.remove();

          showToast("Matriz de banco exportada para arquivo JSON com sucesso!");
        } catch (err) {
          console.error("Erro ao exportar banco local:", err);
          showToast("Erro crítico na compilação do arquivo de backup.", "error");
        }
      };

      // --- IMPORTAR BANCO DE DADOS (Carrega o arquivo JSON e re-insere no Dexie) ---
      const handleImportDatabase = (e) => {
        const fileReader = new FileReader();
        const file = e.target.files[0];
        
        if (!file) return;

        fileReader.onload = async (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            
            if (!importedData.users || !importedData.transactions) {
              showToast("Arquivo inválido. Formato de backup NTC corrompido.", "error");
              return;
            }

            // Limpa as tabelas existentes para não dar colisão de chave primária
            await db.users.clear();
            await db.transactions.clear();
            await db.notes.clear();
            await db.reviews.clear();

            // Insere os registros importados
            if (importedData.users.length) {
              await db.users.bulkAdd(importedData.users);
            }
            if (importedData.transactions.length) {
              await db.transactions.bulkAdd(importedData.transactions);
            }
            if (importedData.notes && importedData.notes.length) {
              await db.notes.bulkAdd(importedData.notes);
            }
            if (importedData.reviews && importedData.reviews.length) {
              await db.reviews.bulkAdd(importedData.reviews);
            }

            showToast("Banco de Dados portátil sincronizado com sucesso!");
            
            await loadRegisteredUsers();
            await loadAllReviews();
            
            if (importedData.users.length > 0) {
              const firstUser = importedData.users[0].username;
              localStorage.setItem('ntc_logged_user', firstUser);
              await loadUserData(firstUser);
            } else {
              window.location.reload();
            }

            // Tenta salvar no GitHub se houver token
            await pushToGitHub();

          } catch (err) {
            console.error("Erro na leitura da importação:", err);
            showToast("Falha ao analisar a estrutura do arquivo JSON.", "error");
          }
        };

        fileReader.readAsText(file);
      };

      // --- SISTEMA DE REGISTRO SEGURO ---
      const handleRegisterRequest = (e) => {
        e.preventDefault();
        setAuthError('');
        const name = usernameInput.trim().toLowerCase();
        if (!name) {
          setAuthError('Você precisa definir um codinome/usuário.');
          return;
        }

        // Verifica se nome de usuário já existe no banco SQLite local (IndexedDB)
        db.users.get(name).then(exists => {
          if (exists) {
            setAuthError('Este nome de usuário já foi registrado neste dispositivo.');
          } else {
            const seed = generateNewSeed();
            setGeneratedSeed(seed);
            setAuthMode('seed_display');
          }
        });
      };

      const handleConfirmRegister = async () => {
        const name = usernameInput.trim().toLowerCase();
        const address = generateAddressFromSeed(generatedSeed);

        const newUserObj = {
          username: name,
          address: address,
          seed: generatedSeed,
          balance: 20.00, // Bônus inicial maior de boas-vindas
          unlockedFeatures: {
            neonThemes: false,
            youtubePlayer: false,
            fusionEngine: false,
            customAvatar: false
          },
          activeNeon: 'purple',
          profileBio: 'Agente cibernético na rede AceleraNet.',
          profileAvatar: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150&auto=format&fit=crop&q=80'
        };

        try {
          await db.users.add(newUserObj);
          
          await db.transactions.add({
            id: 'TX-BOASVINDAS-' + Date.now(),
            username: name,
            toAddress: address,
            fromUser: "SISTEMA",
            amount: 20.00,
            date: new Date().toLocaleString(),
            claimed: true
          });

          localStorage.setItem('ntc_logged_user', name);
          await loadRegisteredUsers();
          await loadUserData(name);
          showToast("Sua identidade foi selada e criptografada com sucesso!");
          
          // Envia o novo registro imediatamente para o repositório se o token estiver ativado
          await pushToGitHub();
        } catch (err) {
          setAuthError("Falha ao salvar conta no banco de dados.");
          console.error(err);
        }
      };

      // --- SISTEMA DE LOGIN VIA FRASE SEMENTE ---
      const handleLoginRequest = async (e) => {
        e.preventDefault();
        setAuthError('');
        const seed = seedInput.trim().toLowerCase();
        if (!seed) {
          setAuthError('Digite sua frase semente ou selecione um perfil salvo.');
          return;
        }

        try {
          const matchedUser = await db.users.where("seed").equals(seed).first();
          if (matchedUser) {
            localStorage.setItem('ntc_logged_user', matchedUser.username);
            await loadUserData(matchedUser.username);
          } else {
            const generatedAddr = generateAddressFromSeed(seed);
            setAuthError(`Semente válida, mas nenhuma carteira associada neste terminal. Endereço gerado seria: ${generatedAddr.substring(0, 10)}...`);
          }
        } catch (err) {
          setAuthError('Erro na checagem criptográfica.');
        }
      };

      // --- LOGOUT SEGURO ---
      const handleLogout = () => {
        localStorage.removeItem('ntc_logged_user');
        setCurrentUser(null);
        setActiveTab('auth');
        setUsernameInput('');
        setSeedInput('');
        showToast("Sessão finalizada com segurança.", "error");
      };

      // --- NOTIFICAÇÕES (TOAST) ---
      const showToast = (message, type = "success") => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3500);
      };

      // --- MURAL DE NOTAS (INDEXEDDB MULTIUSER) ---
      const handleAddNote = async (e) => {
        e.preventDefault();
        if (!newNoteText.trim()) return;

        try {
          const noteObj = {
            username: currentUser.username,
            text: newNoteText.trim(),
            color: activeNeon
          };
          await db.notes.add(noteObj);
          
          const updatedNotes = await db.notes.where("username").equals(currentUser.username).toArray();
          setNotesList(updatedNotes);
          setNewNoteText('');
          showToast("Anotação fixa de segurança salva!");
          await pushToGitHub();
        } catch (err) {
          console.error(err);
        }
      };

      const handleDeleteNote = async (id) => {
        try {
          await db.notes.delete(id);
          setNotesList(notesList.filter(n => n.id !== id));
          showToast("Nota descartada.", "error");
          await pushToGitHub();
        } catch (err) {
          console.error(err);
        }
      };

      // --- VALIDAÇÃO DE ENDEREÇO EM TEMPO REAL ---
      useEffect(() => {
        if (!sendTargetAddress) {
          setTargetUserFound(null);
          return;
        }

        const addressToFind = sendTargetAddress.trim().toUpperCase();
        if (addressToFind.length < 10) return;

        setIsValidatingAddress(true);
        const timer = setTimeout(async () => {
          try {
            const matched = await db.users.where("address").equals(addressToFind).first();
            if (matched) {
              setTargetUserFound(matched);
            } else {
              setTargetUserFound(null);
            }
          } catch (e) {
            console.error(e);
          } finally {
            setIsValidatingAddress(false);
          }
        }, 500);

        return () => clearTimeout(timer);
      }, [sendTargetAddress]);

      // --- TRANSFERÊNCIA REAL DE NTC (P2P MULTIUSER INDEXEDDB) ---
      const handleExecuteTransfer = async (e) => {
        e.preventDefault();
        const amount = parseFloat(sendAmount);
        if (isNaN(amount) || amount <= 0) {
          showToast("Digite uma quantidade válida para transferência.", "error");
          return;
        }

        if (balance < amount) {
          showToast("Balanço insuficiente de Notoriety Coin.", "error");
          return;
        }

        if (!targetUserFound) {
          showToast("Endereço de destino não encontrado na rede local.", "error");
          return;
        }

        if (targetUserFound.address === currentUser.address) {
          showToast("Você não pode transferir moedas para si mesmo.", "error");
          return;
        }

        try {
          // Desconta do remetente
          const senderNewBalance = Number((balance - amount).toFixed(4));
          await db.users.update(currentUser.username, { balance: senderNewBalance });

          // Adiciona ao destinatário
          const receiverNewBalance = Number((targetUserFound.balance + amount).toFixed(4));
          await db.users.update(targetUserFound.username, { balance: receiverNewBalance });

          const transactionId = 'TX-TRANSFER-' + Date.now();

          // Grava log da transação para o remetente
          const txRecordSender = {
            id: transactionId + '-S',
            username: currentUser.username,
            toAddress: targetUserFound.address,
            fromUser: currentUser.username,
            amount: -amount,
            date: new Date().toLocaleString(),
            claimed: true
          };
          await db.transactions.add(txRecordSender);

          // Grava log da transação para o destinatário
          const txRecordReceiver = {
            id: transactionId + '-R',
            username: targetUserFound.username,
            toAddress: targetUserFound.address,
            fromUser: currentUser.username,
            amount: amount,
            date: new Date().toLocaleString(),
            claimed: true
          };
          await db.transactions.add(txRecordReceiver);

          // Atualiza estados do remetente logado
          setBalance(senderNewBalance);
          setSendTargetAddress('');
          setSendAmount('');
          setTargetUserFound(null);

          // Recarrega transações
          const updatedHistory = await db.transactions
            .where("username")
            .equals(currentUser.username)
            .or("toAddress")
            .equals(currentUser.address)
            .reverse()
            .toArray();
          setHistory(updatedHistory);

          showToast(`Sucesso! Enviado ${amount.toFixed(2)} NTC para @${targetUserFound.username}`);

          // Envia a nova transação para o Ledger Global no GitHub Repo
          await pushToGitHub();
        } catch (err) {
          console.error(err);
          showToast("Falha operacional ao processar transação no banco local.", "error");
        }
      };

      // --- ROLETA MOLECULAR (SORTEIO DE NTC COM INDEXEDDB) ---
      const spinWheel = () => {
        if (isSpinning || spinCooldown > 0) return;
        setIsSpinning(true);
        setSpinResult(null);

        const prizes = [
          { value: 0.1, label: '0.1 NTC (Farm Solar)' },
          { value: 0.5, label: '0.5 NTC (Sinal de Dados)' },
          { value: 1.0, label: '1.0 NTC (Código Estável)' },
          { value: 3.0, label: '3.0 NTC (Bônus de Rede)' },
          { value: 0.0, label: 'Sem Conexão (Tente de Novo)' },
          { value: 8.0, label: 'JACKPOT CRÍPTICO (8.0 NTC)' }
        ];

        const chosenIndex = Math.floor(Math.random() * prizes.length);
        const win = prizes[chosenIndex];

        spinRotation.current = spinRotation.current + 1440 + (chosenIndex * 60);

        setTimeout(async () => {
          setIsSpinning(false);
          setSpinResult(win);

          if (win.value > 0) {
            try {
              const newBal = Number((balance + win.value).toFixed(4));
              await db.users.update(currentUser.username, { balance: newBal });
              
              await db.transactions.add({
                id: 'TX-SPIN-' + Date.now(),
                username: currentUser.username,
                toAddress: currentUser.address,
                fromUser: "SISTEMA (Roleta)",
                amount: win.value,
                date: new Date().toLocaleString(),
                claimed: true
              });

              setBalance(newBal);
              
              const updatedHistory = await db.transactions
                .where("username")
                .equals(currentUser.username)
                .or("toAddress")
                .equals(currentUser.address)
                .reverse()
                .toArray();
              setHistory(updatedHistory);

              showToast(`Você farmou +${win.value} NTC na roleta molecular!`);
              await pushToGitHub();
            } catch (err) {
              console.error(err);
            }
          } else {
            showToast("Vórtice instável. Nenhum NTC sintetizado desta vez.", "error");
          }

          setSpinCooldown(45); 
        }, 3200);
      };

      // Cooldown & Engine Mineração Loop
      useEffect(() => {
        const interval = setInterval(() => {
          if (spinCooldown > 0) {
            setSpinCooldown(prev => prev - 1);
          }

          setEngines(prev => {
            let stateChanged = false;
            const updatedEngines = { ...prev };

            Object.keys(updatedEngines).forEach(key => {
              const engine = updatedEngines[key];
              if (engine.active && engine.timeLeft > 0) {
                engine.timeLeft -= 1;
                stateChanged = true;

                if (engine.timeLeft === 0) {
                  engine.active = false;
                  payoutMiningReward(engine.reward, engine.label);
                }
              }
            });

            return stateChanged ? updatedEngines : prev;
          });
        }, 1000);

        return () => clearInterval(interval);
      }, [engines, balance]);

      const payoutMiningReward = async (reward, label) => {
        try {
          const finalBal = Number((balance + reward).toFixed(4));
          await db.users.update(currentUser.username, { balance: finalBal });

          await db.transactions.add({
            id: 'TX-MINING-' + Date.now(),
            username: currentUser.username,
            toAddress: currentUser.address,
            fromUser: `MINERAÇÃO (${label})`,
            amount: reward,
            date: new Date().toLocaleString(),
            claimed: true
          });

          setBalance(finalBal);
          
          const updatedHistory = await db.transactions
            .where("username")
            .equals(currentUser.username)
            .or("toAddress")
            .equals(currentUser.address)
            .reverse()
            .toArray();
          setHistory(updatedHistory);

          showToast(`Ciclo completo! ${label} pagou +${reward} NTC.`);
          await pushToGitHub();
        } catch (err) {
          console.error(err);
        }
      };

      const handleStartEngine = (key) => {
        const engine = engines[key];
        if (engine.active) return;

        setEngines(prev => ({
          ...prev,
          [key]: {
            ...prev[key],
            active: true,
            timeLeft: engine.duration
          }
        }));

        showToast(`Motor de indução "${engine.label}" iniciado!`);
      };

      const handleBuyUpgrade = async (key) => {
        const product = SHOP_ITEMS[key];
        if (!product) return;

        if (balance < product.price) {
          showToast("Saldo Notoriety Coin insuficiente para este upgrade.", "error");
          return;
        }

        try {
          const nextBal = Number((balance - product.price).toFixed(4));
          const updatedUnlocked = { ...unlockedFeatures, [key]: true };

          await db.users.update(currentUser.username, {
            balance: nextBal,
            unlockedFeatures: updatedUnlocked
          });

          await db.transactions.add({
            id: 'TX-SHOP-' + Date.now(),
            username: currentUser.username,
            toAddress: "UPGRADE SHOP",
            fromUser: currentUser.username,
            amount: -product.price,
            date: new Date().toLocaleString(),
            claimed: true
          });

          setBalance(nextBal);
          setUnlockedFeatures(updatedUnlocked);

          const updatedHistory = await db.transactions
            .where("username")
            .equals(currentUser.username)
            .or("toAddress")
            .equals(currentUser.address)
            .reverse()
            .toArray();
          setHistory(updatedHistory);

          showToast(`Módulo "${product.label}" adicionado ao sistema!`);
          await pushToGitHub();
        } catch (err) {
          console.error(err);
        }
      };

      const handlePublishReview = async (e) => {
        e.preventDefault();
        if (!newReview.title || !newReview.host || !newReview.reviewText) {
          showToast("Por favor, preencha todos os campos do log cibernético.", "error");
          return;
        }

        if (!newReview.consented) {
          showToast("É obrigatório validar o consentimento de rede.", "error");
          return;
        }

        try {
          const reviewObj = {
            id: 'REV-' + Date.now(),
            author: currentUser.username,
            title: newReview.title.trim(),
            host: newReview.host.trim(),
            vibe: parseInt(newReview.vibe),
            reviewText: newReview.reviewText.trim(),
            timestamp: new Date().toLocaleString()
          };

          await db.reviews.add(reviewObj);

          const incentiveReward = 1.50;
          const updatedBal = Number((balance + incentiveReward).toFixed(4));
          await db.users.update(currentUser.username, { balance: updatedBal });

          await db.transactions.add({
            id: 'TX-REV-BONUS-' + Date.now(),
            username: currentUser.username,
            toAddress: currentUser.address,
            fromUser: "MURAL INCENTIVO",
            amount: incentiveReward,
            date: new Date().toLocaleString(),
            claimed: true
          });

          setBalance(updatedBal);
          setNewReview({ title: '', host: '', vibe: 5, reviewText: '', consented: false });
          
          await loadAllReviews();
          
          const updatedHistory = await db.transactions
            .where("username")
            .equals(currentUser.username)
            .or("toAddress")
            .equals(currentUser.address)
            .reverse()
            .toArray();
          setHistory(updatedHistory);

          showToast("Log de experiência adicionado! +1.50 NTC injetado.");
          await pushToGitHub();
        } catch (err) {
          console.error(err);
        }
      };

      const handleUpdateProfile = async (e) => {
        e.preventDefault();
        try {
          const updatedObj = {
            profileBio,
            profileAvatar,
            activeNeon
          };
          await db.users.update(currentUser.username, updatedObj);
          showToast("Sinal de identidade modificado no banco!");
          await pushToGitHub();
        } catch (err) {
          console.error(err);
        }
      };

      // --- ESCUTA CONEXÕES EXTERNAS (BARRAMENTO DE GAMES / APPS EMBEDADOS) ---
      useEffect(() => {
        const handleExternalMessage = (event) => {
          const { data } = event;
          if (!data || data.source !== 'NTC_PARTNER_SITE') return;

          if (data.type === 'REQUEST_CONNECTION') {
            setPendingRequests(prev => [...prev, {
              id: data.requestId,
              origin: event.origin,
              type: 'connect',
              title: 'Autorizar Conexão de Carteira',
              desc: `O portal externo em ${event.origin} está solicitando leitura do seu endereço de carteira local e pseudônimo.`,
              sourceWindow: event.source
            }]);
          } else if (data.type === 'REQUEST_TRANSACTION') {
            const amountVal = parseFloat(data.amount);
            const isSpend = data.txType === 'SPEND';

            setPendingRequests(prev => [...prev, {
              id: data.requestId,
              origin: event.origin,
              type: 'transaction',
              txType: data.txType || 'EARN',
              title: isSpend ? 'Autorizar Débito Seguro' : 'Coletar Recompensa Cyber',
              desc: isSpend
                ? `O site parceiro ${event.origin} deseja retirar ${amountVal} NTC de sua conta para liberar: "${data.label || 'Item Digital'}"`
                : `Você recebeu uma proposta de crédito de ${amountVal} NTC via "${data.label || 'Missão Computada'}".`,
              amount: amountVal,
              label: data.label || 'Transação Segura',
              sourceWindow: event.source
            }]);
          }
        };

        window.addEventListener('message', handleExternalMessage);
        return () => window.removeEventListener('message', handleExternalMessage);
      }, [currentUser, balance]);

      const [pendingRequests, setPendingRequests] = useState([]);

      const handleApproveExternal = async (req) => {
        if (!currentUser) return;

        if (req.type === 'connect') {
          req.sourceWindow.postMessage({
            type: 'NTC_CONNECTION_RESPONSE',
            requestId: req.id,
            status: 'approved',
            address: currentUser.address,
            username: currentUser.username
          }, req.origin);
          showToast("Barramento de dados conectado com sucesso!");
        } else if (req.type === 'transaction') {
          const isSpend = req.txType === 'SPEND';
          if (isSpend && balance < req.amount) {
            showToast("Balanço NTC insuficiente para autorizar o débito.", "error");
            req.sourceWindow.postMessage({
              type: 'NTC_TRANSACTION_RESPONSE',
              requestId: req.id,
              status: 'declined',
              error: 'Saldo insuficiente.'
            }, req.origin);
            setPendingRequests(prev => prev.filter(p => p.id !== req.id));
            return;
          }

          const multiplier = isSpend ? -1 : 1;
          const nextBal = Number((balance + (req.amount * multiplier)).toFixed(4));

          try {
            await db.users.update(currentUser.username, { balance: nextBal });
            await db.transactions.add({
              id: 'TX-EXTERNAL-' + Date.now(),
              username: currentUser.username,
              toAddress: isSpend ? "LOJA PARCEIRA" : currentUser.address,
              fromUser: isSpend ? currentUser.username : "RECOMPENSA PARCEIRA",
              amount: req.amount * multiplier,
              date: new Date().toLocaleString(),
              claimed: true
            });

            setBalance(nextBal);

            const updatedHistory = await db.transactions
              .where("username")
              .equals(currentUser.username)
              .or("toAddress")
              .equals(currentUser.address)
              .reverse()
              .toArray();
            setHistory(updatedHistory);

            req.sourceWindow.postMessage({
              type: 'NTC_TRANSACTION_RESPONSE',
              requestId: req.id,
              status: 'approved',
              newBalance: nextBal
            }, req.origin);

            showToast(isSpend ? `Transação concluída: -${req.amount} NTC` : `Recompensa aceita: +${req.amount} NTC`);
            await pushToGitHub();
          } catch (err) {
            console.error(err);
          }
        }
        setPendingRequests(prev => prev.filter(p => p.id !== req.id));
      };

      const handleDeclineExternal = (req) => {
        req.sourceWindow.postMessage({
          type: req.type === 'connect' ? 'NTC_CONNECTION_RESPONSE' : 'NTC_TRANSACTION_RESPONSE',
          requestId: req.id,
          status: 'declined',
          error: 'Operação cancelada pelo usuário.'
        }, req.origin);

        setPendingRequests(prev => prev.filter(p => p.id !== req.id));
        showToast("Solicitação de barramento rejeitada.", "error");
      };

      return (
        <div className="flex-grow flex flex-col justify-between">
          
          {/* Header */}
          <header className={`border-b border-purple-950/40 bg-black/80 backdrop-blur-md px-6 py-4 sticky top-0 z-40 transition-all ${currentNeon.glow}`}>
            <div className="max-w-6xl mx-auto flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 font-orbitron">
              <div className="flex items-center space-x-3">
                <div className={`h-11 w-11 rounded-xl bg-gradient-to-tr from-purple-600 via-pink-600 to-amber-400 flex items-center justify-center ${currentNeon.glow}`}>
                  <span className="font-black text-2xl text-white">N</span>
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-amber-300">
                    NTC ECOSYSTEM v2.5
                  </h1>
                  <p className="text-[10px] text-purple-300/70 tracking-widest uppercase">Safe Browser Database Terminal</p>
                </div>
              </div>

              <div className="flex items-center space-x-3 justify-between sm:justify-end">
                {currentUser && (
                  <div className="flex items-center space-x-4 text-xs font-semibold">
                    <img 
                      src={profileAvatar} 
                      alt="Avatar" 
                      className={`h-9 w-9 rounded-lg object-cover border ${currentNeon.border} ${currentNeon.glow}`} 
                    />
                    <div className="text-right">
                      <span className="text-gray-500 block uppercase text-[8px] tracking-widest">Usuário de Rede</span>
                      <span className={`${currentNeon.text} font-bold`}>@{currentUser.username}</span>
                    </div>
                    
                    {githubSyncStatus === 'synced' ? (
                      <span className="text-green-400 flex items-center space-x-1" title="Ledger Global sincronizado com database.json do repositório no GitHub Pages">
                        <span className="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                        <span className="hidden md:inline font-mono text-[9px] uppercase tracking-wider">Ledger Sincronizado</span>
                      </span>
                    ) : githubSyncStatus === 'loading' ? (
                      <span className="text-yellow-400 flex items-center space-x-1">
                        <i data-lucide="refresh-cw" className="w-3 h-3 animate-spin"></i>
                        <span className="hidden md:inline font-mono text-[9px] uppercase tracking-wider">Gravando Ledger...</span>
                      </span>
                    ) : (
                      <span className="text-gray-500 flex items-center space-x-1" title="Banco operando em modo isolado local">
                        <span className="h-2 w-2 rounded-full bg-gray-500"></span>
                        <span className="hidden md:inline font-mono text-[9px] uppercase tracking-wider">DB Local</span>
                      </span>
                    )}

                    <button 
                      onClick={handleLogout} 
                      className="px-3 py-1.5 bg-red-950/40 text-red-400 hover:text-red-200 hover:bg-red-900/30 border border-red-900/40 rounded-lg transition"
                    >
                      Desconectar
                    </button>
                  </div>
                )}
              </div>
            </div>
          </header>

          {/* Modal de Pedido de Barramento Externo */}
          {pendingRequests.length > 0 && (
            <div className="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
              <div className="bg-[#0b0b14] border-2 border-pink-500 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animate-bounce">
                <div className="bg-gradient-to-r from-purple-900 to-pink-900 px-6 py-4 flex items-center space-x-3">
                  <div className="bg-pink-500/20 p-2 rounded-lg text-pink-400 animate-pulse">
                    <i data-lucide="shield-alert" className="w-6 h-6"></i>
                  </div>
                  <h3 className="font-orbitron font-bold text-lg text-white">Intercepção de Barramento</h3>
                </div>
                <div className="p-6 space-y-4">
                  <p className="text-gray-300 text-sm leading-relaxed">
                    {pendingRequests[0].desc}
                  </p>
                  <div className="bg-black/60 p-3 rounded-lg border border-purple-950">
                    <span className="text-[9px] text-gray-500 block uppercase font-mono">Assinatura de Origem</span>
                    <span className="text-xs text-purple-300 font-mono break-all">{pendingRequests[0].origin}</span>
                    
                    {pendingRequests[0].amount && (
                      <div className="mt-3 pt-2 border-t border-purple-950/60 flex justify-between items-center">
                        <span className="text-xs text-gray-400">Total Solicitado:</span>
                        <span className={`text-sm font-orbitron font-bold ${pendingRequests[0].txType === 'SPEND' ? 'text-red-400' : 'text-green-400'}`}>
                          {pendingRequests[0].txType === 'SPEND' ? '-' : '+'}{pendingRequests[0].amount.toFixed(2)} NTC
                        </span>
                      </div>
                    )}
                  </div>
                  <div className="grid grid-cols-2 gap-3 pt-2">
                    <button

                        </p>
                      )}
                    </div>

                    <div className="p-4 bg-purple-950/20 border border-purple-900/30 rounded-xl text-xs text-gray-400 space-y-2">
                      <p className="font-bold text-gray-200">Como configurar o Netlify?</p>
                      <p>
                        <strong>Passo 1:</strong> Faça deploy desta pasta no Netlify (clique em "New Site from Git")<br/>
                        <strong>Passo 2:</strong> Vá em Site Settings → Build & Deploy → Environment<br/>
                        <strong>Passo 3:</strong> Adicione as variáveis de ambiente:
                      </p>
                      <ul className="list-disc list-inside space-y-1 text-gray-500 ml-2">
                        <li><code className="text-cyan-400">GITHUB_TOKEN</code> = seu Personal Access Token</li>
                        <li><code className="text-cyan-400">GITHUB_OWNER</code> = seu username (ex: aceleradox)</li>
                        <li><code className="text-cyan-400">GITHUB_REPO</code> = nome do repo (ex: NTC-wallet)</li>
                        <li><code className="text-cyan-400">GITHUB_PATH</code> = database.json</li>
                      </ul>
                      <p className="mt-2">Pronto! A sincronização automática começará a funcionar.</p>
                    </div>
                  </div>
                )}

              </div>
            )}
          </main>

          {/* Rodapé do ecossistema */}
          <footer className="border-t border-purple-950 bg-black/80 px-6 py-4 text-center mt-12 text-[10px] text-gray-500 font-orbitron tracking-wider">
            <p>Notoriety Coin Wallet &copy; 2026. Sincronizado por banco de dados transacional IndexedDB local para máxima privacidade no GitHub Pages.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
